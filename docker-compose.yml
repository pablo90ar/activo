services:
  backend:
    image: pablo90ar/activo-backend:latest
    platform: linux/arm/v7
    container_name: activo-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: pablo90ar/activo-frontend:latest
    platform: linux/arm/v7
    container_name: activo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: activo-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
    command: --interval 300 --cleanup