services:
  backend:
    image: pablo90ar/activo-backend:latest
    platform: linux/arm/v8
    container_name: activo-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: pablo90ar/activo-frontend:latest
    platform: linux/arm/v8
    container_name: activo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db-backup:
    image: alpine:latest
    container_name: activo-db-backup
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./backups:/backups
    command: sh -c "while true; do cp /data/activo.db /backups/activo_$$(date +%Y%m%d_%H%M%S).db && find /backups -name 'activo_*.db' -mtime +7 -delete && sleep 86400; done"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: activo-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=10
      - WATCHTOWER_LABEL_ENABLE=true
    command: --interval 10 --cleanup